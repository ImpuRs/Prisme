<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Scan Beta — ZBar vs ZXing vs OCR</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0b1220;color:#f8fafc;font-family:-apple-system,system-ui,sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center}
    h1{font-size:15px;padding:12px;text-align:center;font-weight:900}
    .cam-wrap{position:relative;width:100%;max-width:500px;aspect-ratio:4/3;background:#000;border-radius:12px;overflow:hidden}
    video{width:100%;height:100%;object-fit:cover}
    .badge{position:absolute;top:10px;left:10px;padding:5px 10px;border-radius:99px;font-size:11px;font-weight:800;background:rgba(96,165,250,.15);color:#60a5fa;border:1px solid rgba(96,165,250,.3)}
    .flash{position:absolute;inset:0;background:rgba(74,222,128,.25);opacity:0;pointer-events:none;transition:opacity .1s}
    .flash.on{opacity:1}
    .bench{width:100%;max-width:500px;padding:8px 12px}
    .bench-row{display:flex;gap:6px;margin-bottom:6px}
    .bench-card{flex:1;padding:10px;background:rgba(17,27,47,.86);border:1px solid #2b3b5a;border-radius:8px;text-align:center}
    .bench-card .name{font-size:10px;font-weight:900;text-transform:uppercase;color:#94a3b8;letter-spacing:.5px}
    .bench-card .time{font-size:20px;font-weight:950;margin-top:2px;font-variant-numeric:tabular-nums}
    .bench-card .time.fast{color:#4ade80}
    .bench-card .time.mid{color:#fbbf24}
    .bench-card .time.slow{color:#f87171}
    .bench-card .detail{font-size:10px;color:#64748b;margin-top:2px}
    .results{width:100%;max-width:500px;padding:0 12px}
    .result{padding:8px 12px;background:rgba(17,27,47,.86);border:1px solid #2b3b5a;border-radius:8px;margin-bottom:4px;font-size:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
    .result .code{font-family:ui-monospace,monospace;color:#60a5fa;font-size:14px}
    .result .meta{color:#94a3b8;font-size:10px;text-align:right}
    .stats{padding:6px 12px;color:#64748b;font-size:11px;text-align:center;font-variant-numeric:tabular-nums;max-width:500px;width:100%}
    .load-msg{text-align:center;color:#94a3b8;font-size:12px;padding:8px}
  </style>
</head>
<body>
  <h1>Benchmark — ZBar vs ZXing vs OCR</h1>
  <div class="load-msg" id="loadMsg">Chargement des moteurs...</div>

  <div class="cam-wrap" id="camWrap" style="display:none">
    <video id="video" autoplay playsinline muted></video>
    <div class="badge" id="badge">—</div>
    <div class="flash" id="flash"></div>
  </div>

  <div class="bench" id="benchArea" style="display:none">
    <div class="bench-row">
      <div class="bench-card">
        <div class="name">ZBar</div>
        <div class="time" id="tZbar">—</div>
        <div class="detail" id="dZbar">—</div>
      </div>
      <div class="bench-card">
        <div class="name">ZXing</div>
        <div class="time" id="tZxing">—</div>
        <div class="detail" id="dZxing">—</div>
      </div>
      <div class="bench-card">
        <div class="name">OCR</div>
        <div class="time" id="tOcr">—</div>
        <div class="detail" id="dOcr">—</div>
      </div>
    </div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="results" id="results"></div>

<!-- ZBar WASM -->
<script src="https://cdn.jsdelivr.net/npm/@undecaf/zbar-wasm@0.11.0/dist/index.js" onerror="console.log('ZBar unavailable')"></script>
<!-- ZXing WASM -->
<script src="https://cdn.jsdelivr.net/npm/zxing-wasm@3.0.3/dist/iife/reader/index.js" onerror="console.log('ZXing unavailable')"></script>

<script type="module">
// ── Tesseract.js — lazy load, digits only ──
let tesseractWorker = null;
let ocrReady = false;
let ocrLoading = false;

async function initOCR() {
  if (ocrReady || ocrLoading) return;
  ocrLoading = true;
  try {
    const Tess = (await import('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.esm.min.js')).default;
    tesseractWorker = await Tess.createWorker('eng', 1, {
      workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/worker.min.js',
      corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core-simd-lstm.wasm.js',
    });
    await tesseractWorker.setParameters({
      tessedit_char_whitelist: '0123456789',
      tessedit_pageseg_mode: '7', // single line
    });
    ocrReady = true;
    console.log('[Beta] Tesseract OCR loaded');
  } catch(e) {
    console.warn('[Beta] OCR load error:', e);
    // Keep ocrLoading=true to prevent retry spam
    return;
  }
  ocrLoading = false;
}

const videoEl = document.getElementById('video');
const badge = document.getElementById('badge');
const flash = document.getElementById('flash');
let canvas, ctx;
let ocrCanvas, ocrCtx; // canvas séparé pour le crop OCR
let frameCount = 0;
let emptyFrames = 0;
const seen = new Map();
const history = [];

// Avg trackers
const avgs = { zbar: [], zxing: [], ocr: [] };
const MAX_AVG = 50;
function addAvg(key, ms) { avgs[key].push(ms); if (avgs[key].length > MAX_AVG) avgs[key].shift(); }
function getAvg(key) { const a = avgs[key]; return a.length ? (a.reduce((s,v)=>s+v,0)/a.length) : 0; }

// Wait a tick for IIFE scripts to execute
await new Promise(r => setTimeout(r, 100));

// Status
const loadMsg = document.getElementById('loadMsg');
const hasZbar = typeof window.zbarWasm !== 'undefined';
const hasZxing = typeof window.ZXingWASM !== 'undefined';
console.log('[Beta] ZBar:', hasZbar, 'ZXing:', hasZxing);
loadMsg.textContent = `ZBar: ${hasZbar?'OK':'NON'} | ZXing: ${hasZxing?'OK':'NON'} | OCR: lazy (stage 4)`;

// Start camera
try {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false,
  });
  videoEl.srcObject = stream;
  await new Promise(r => { videoEl.onloadedmetadata = r; });
  videoEl.play();
  // Autofocus continu + zoom x1.5
  try {
    const track = stream.getVideoTracks()[0];
    const caps = track.getCapabilities?.();
    if (caps?.focusMode?.includes('continuous'))
      await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
    if (caps?.zoom) {
      const z = Math.min(1.5, caps.zoom.max);
      await track.applyConstraints({ advanced: [{ zoom: z }] });
    }
  } catch(e){}
  document.getElementById('camWrap').style.display = 'block';
  document.getElementById('benchArea').style.display = 'block';
  loadMsg.style.display = 'none';
  scanLoop();
} catch(e) {
  loadMsg.textContent = 'Camera error: ' + e.message;
  loadMsg.style.color = '#f87171';
}

async function scanLoop() {
  const vw = videoEl.videoWidth, vh = videoEl.videoHeight;
  if (!vw || !vh) { setTimeout(scanLoop, 100); return; }

  if (!canvas) {
    canvas = document.createElement('canvas');
    ctx = canvas.getContext('2d', { willReadFrequently: true });
  }

  // Crop centre 76%
  const VF = 0.76;
  const side = Math.round(Math.min(vw, vh) * VF);
  const cx = Math.round((vw - side) / 2);
  const cy = Math.round((vh - side) / 2);
  canvas.width = side; canvas.height = side;
  ctx.drawImage(videoEl, cx, cy, side, side, 0, 0, side, side);
  const imageData = ctx.getImageData(0, 0, side, side);

  frameCount++;

  // ── ZBar ──
  let tZbar = 0, zbarRes = [];
  if (hasZbar) {
    const t0 = performance.now();
    try {
      const symbols = await window.zbarWasm.scanImageData(imageData);
      zbarRes = symbols.map(s => ({ text: s.decode().replace(/\s/g, ''), engine: 'ZBar' }));
    } catch(e) {}
    tZbar = performance.now() - t0;
    addAvg('zbar', tZbar);
  }

  // ── ZXing ──
  let tZxing = 0, zxingRes = [];
  if (hasZxing) {
    const t0 = performance.now();
    try {
      const res = await window.ZXingWASM.readBarcodes(imageData, {
        tryHarder: true,
        formats: ['EAN-13', 'EAN-8', 'Code128', 'Code39'],
        maxNumberOfSymbols: 4,
      });
      zxingRes = res.map(r => ({ text: r.text.replace(/\s/g, ''), engine: 'ZXing' }));
    } catch(e) {}
    tZxing = performance.now() - t0;
    addAvg('zxing', tZxing);
  }

  // ── OCR (stage 4 : 20+ frames vides) ──
  let tOcr = 0, ocrRes = [];
  const barcodeFound = zbarRes.length > 0 || zxingRes.length > 0;
  if (barcodeFound) { emptyFrames = 0; } else { emptyFrames++; }

  // Lazy-load Tesseract dès 15 frames vides
  if (emptyFrames >= 15 && !ocrReady && !ocrLoading) {
    initOCR();
    updateCard('Ocr', 0, [], true, 'chargement...');
  }

  // Run OCR toutes les 3 frames à partir de 20 frames vides
  if (emptyFrames >= 20 && ocrReady && frameCount % 3 === 0) {
    const t0 = performance.now();
    try {
      // Crop bande basse du viewfinder (35% bas, là où les chiffres sont imprimés)
      if (!ocrCanvas) {
        ocrCanvas = document.createElement('canvas');
        ocrCtx = ocrCanvas.getContext('2d', { willReadFrequently: true });
      }
      const cropH = Math.round(side * 0.30);
      const cropY = side - cropH;
      ocrCanvas.width = side;
      ocrCanvas.height = cropH;
      ocrCtx.drawImage(canvas, 0, cropY, side, cropH, 0, 0, side, cropH);

      // Binarize pour meilleure OCR (seuil adaptatif)
      const ocrData = ocrCtx.getImageData(0, 0, side, cropH);
      const px = ocrData.data;
      for (let i = 0; i < px.length; i += 4) {
        const gray = px[i] * 0.299 + px[i+1] * 0.587 + px[i+2] * 0.114;
        const bw = gray < 128 ? 0 : 255;
        px[i] = px[i+1] = px[i+2] = bw;
      }
      ocrCtx.putImageData(ocrData, 0, 0);

      const { data } = await tesseractWorker.recognize(ocrCanvas);
      const cleaned = data.text.replace(/\s/g, '');
      // Extraire séquences de 5-6 ou 8 ou 13 chiffres
      const matches = cleaned.match(/\d{13}|\d{8}|\d{5,6}/g) || [];
      ocrRes = matches.map(m => ({ text: m, engine: 'OCR' }));
      if (ocrRes.length) console.log('[OCR] found:', ocrRes.map(r=>r.text));
    } catch(e) {
      if (frameCount <= 5) console.log('[OCR] error:', e.message);
    }
    tOcr = performance.now() - t0;
    addAvg('ocr', tOcr);
  }

  // Update bench cards
  updateCard('Zbar', tZbar, zbarRes, hasZbar);
  updateCard('Zxing', tZxing, zxingRes, hasZxing);
  updateCard('Ocr', tOcr, ocrRes, ocrReady || emptyFrames >= 15,
    !ocrReady && emptyFrames >= 15 ? 'chargement...' :
    emptyFrames < 20 ? (ocrReady ? 'en veille' : 'attente') : undefined);

  // Merge all results
  const now = Date.now();
  const seenThisFrame = new Set();
  for (const r of [...zbarRes, ...zxingRes, ...ocrRes]) {
    if (!r.text) continue;
    if (seenThisFrame.has(r.text)) continue;
    seenThisFrame.add(r.text);
    const prev = seen.get(r.text);
    if (prev && now - prev < 3000) continue;
    seen.set(r.text, now);
    history.unshift(r);
    if (history.length > 20) history.pop();
    flash.classList.add('on');
    setTimeout(() => flash.classList.remove('on'), 150);
    try { navigator.vibrate?.(80); } catch(e){}
  }

  renderResults();
  badge.textContent = `Frame ${frameCount}` + (emptyFrames >= 20 ? ' [OCR]' : '');
  document.getElementById('stats').textContent =
    `Moyenne — ZBar: ${getAvg('zbar').toFixed(0)}ms | ZXing: ${getAvg('zxing').toFixed(0)}ms | OCR: ${getAvg('ocr').toFixed(0)}ms · vides: ${emptyFrames}`;

  setTimeout(scanLoop, 120);
}

function updateCard(name, ms, results, available, override) {
  const tEl = document.getElementById('t' + name);
  const dEl = document.getElementById('d' + name);
  if (!available) { tEl.textContent = 'N/A'; tEl.className = 'time slow'; dEl.textContent = 'attente'; return; }
  if (override) { tEl.textContent = '...'; tEl.className = 'time mid'; dEl.textContent = override; return; }
  tEl.textContent = ms > 0 ? ms.toFixed(0) + 'ms' : '—';
  tEl.className = 'time ' + (ms < 30 ? 'fast' : ms < 80 ? 'mid' : 'slow');
  dEl.textContent = results.length ? results.map(r=>r.text).join(', ') : 'rien';
}

function renderResults() {
  const el = document.getElementById('results');
  el.innerHTML = history.map(r =>
    `<div class="result"><span class="code">${r.text}</span><span class="meta">${r.engine}</span></div>`
  ).join('');
}
</script>
</body>
</html>
